      // 4. Custom SVG Donut Chart (Highly Interactive and robust alternative to Recharts)
      function CustomDonutChart({ data, totalValue, isLoading }) {
        if (isLoading) {
          return (
            <div className="flex items-center justify-center h-44 w-full">
              <div className="text-slate-400 font-mono text-xs flex items-center gap-1.5 animate-pulse">

              </div>

          );

        if (!data || data.length === 0) {
          return (
            <div className="flex items-center justify-center h-44 w-full">
              <div className="text-slate-400 text-xs py-8 text-center bg-slate-50/50 border border-slate-100 rounded-2xl w-full">
                Não há dados de categorias para exibir
              </div>
            </div>
          );
        }

        const radius = 38;
        const circumference = 2 * Math.PI * radius; // ~238.76
        let accumulatedPercent = 0;

        return (
          <div className="relative w-40 h-40 flex items-center justify-center shrink-0">
            <svg width="100%" height="100%" viewBox="0 0 100 100" className="transform -rotate-90">
              <circle cx="50" cy="50" r={radius} fill="transparent" stroke="#f8fafc" strokeWidth="11" />
              {data.map((slice, index) => {
                const percent = slice.value / totalValue;
                const strokeDasharray = `${percent * circumference} ${circumference}`;
                const strokeDashoffset = -accumulatedPercent * circumference;
                accumulatedPercent += percent;

                return (
                  <circle
                    key={index}
                    cx="50"
                    cy="50"
                    r={radius}
                    fill="transparent"
                    stroke={slice.color}
                    strokeWidth="11"
                    strokeDasharray={strokeDasharray}
                    strokeDashoffset={strokeDashoffset}
                    className="transition-all duration-300 hover:stroke-[13px] cursor-pointer"
                    style={{ transformOrigin: 'center' }}
                  >
                    <title>{slice.name}: {formatBRL(slice.value)}</title>
                  </circle>
                );
              })}

              <span className="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Total</span>
              <span className="text-sm font-extrabold text-slate-800 font-display leading-none">{data.length} Itens</span>
            </div>
          </div>
        );

          categoryDataMap[cat] = (categoryDataMap[cat] || 0) + val;

      // 7. TransactionForm subcomponent
      function TransactionForm({ onAddTransaction, isLoading }) {
        const [tipo, setTipo] = useState('DESPESA');
        const [valor, setValor] = useState('');
        const [recebedor, setRecebedor] = useState('');
        const [categoria, setCategoria] = useState('');
        const [observacoes, setObservacoes] = useState('');
        
        const [formError, setFormError] = useState(null);
        const [success, setSuccess] = useState(false);

        const handleTypeChange = (newTipo) => {
          setTipo(newTipo);
          setCategoria('');
        };

        const handleSubmit = async (e) => {
          e.preventDefault();
          setFormError(null);
          setSuccess(false);

          const numericValue = parseFloat(valor);
          if (isNaN(numericValue) || numericValue <= 0) {
            setFormError("Insira um valor numérico válido maior que zero.");
            return;
          }

          if (!recebedor.trim()) {
            setFormError("Informe o recebedor, favorecido ou origem.");
            return;
          }

          const selectedCategory = categoria || CATEGORIES[tipo][0];

          try {
            await onAddTransaction({
              tipo,
              valor: numericValue,
              recebedor: recebedor.trim(),
              categoria: selectedCategory,
              observacoes: observacoes.trim() || undefined
            });

            // Clean inputs on success
            setValor('');
            setRecebedor('');
            setCategoria('');
            setObservacoes('');
            setSuccess(true);
            
            setTimeout(() => {
              setSuccess(false);
            }, 3000);

          } catch (err) {
            setFormError(err.message || "Ocorreu um erro ao salvar o registro.");
          }
        };

        const availableCategories = CATEGORIES[tipo];

        return (
          <div className="bg-white rounded-3xl border border-slate-200/80 shadow-md p-6">
            <div className="flex items-center gap-2.5 mb-4 pb-2 border-b border-slate-100">

                <Icon name="plusCircle" className="w-5 h-5" />
              </div>
              <div>
                <h3 className="font-display font-bold text-sm text-slate-800">Novo Lançamento</h3>
                <p className="text-[11px] text-slate-400">Registre saídas e entradas em sua planilha</p>
              </div>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              
              {/* Type Switch Toggle Selector */}
              <div>
                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 select-none">
                  Tipo de Registro
                </label>
                <div className="grid grid-cols-2 gap-2 bg-slate-50 p-1 rounded-xl border border-slate-150">
                  <button
                    type="button"
                    onClick={() => handleTypeChange('DESPESA')}
                    className={`py-2 text-center text-xs font-bold rounded-lg transition-all cursor-pointer ${
                      tipo === 'DESPESA'
                        ? 'bg-rose-500 text-white shadow-sm'
                        : 'text-slate-500 hover:bg-slate-200/50'
                    }`}
                  >
                    Despesa (-)
                  </button>
                  <button
                    type="button"
                    onClick={() => handleTypeChange('RECEITA')}
                    className={`py-2 text-center text-xs font-bold rounded-lg transition-all cursor-pointer ${
                      tipo === 'RECEITA'
                        ? 'bg-emerald-500 text-white shadow-sm'
                        : 'text-slate-500 hover:bg-slate-200/50'
                    }`}
                  >
                    Receita (+)
                  </button>
                </div>
              </div>

              {/* Cash value input */}
              <div>
                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 flex items-center gap-1 select-none">
                  <Icon name="dollarSign" className="w-3.5 h-3.5 text-slate-400" />
                  Valor (R$)
                </label>
                <div className="relative">
                  <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 font-mono select-none">R$</span>
                  <input
                    type="number"
                    step="0.01"
                    min="0.01"
                    value={valor}
                    onChange={(e) => setValor(e.target.value)}
                    className="w-full text-sm font-bold text-slate-700 bg-white border border-slate-200 rounded-xl pl-9 pr-3 py-2.5 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-100 font-mono"
                    placeholder="0,00"
                    required
                  />
                </div>
              </div>

              {/* Dynamic forms depending on selection */}
              {tipo === 'DESPESA' ? (
                <div className="space-y-4 animate-fadeIn">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">

                    <input
                      type="text"
                      value={recebedor}
                      onChange={(e) => setRecebedor(e.target.value)}

                      placeholder="Ex: Supermercado, Aluguel, etc."
                      required
                    />
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                      <Icon name="listFilter" className="w-3.5 h-3.5 text-slate-400" />

                    </label>
                    <select
                      value={categoria}
                      onChange={(e) => setCategoria(e.target.value)}
                      className="w-full text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-indigo-500"
                    >
                      <option value="" disabled>Selecione uma categoria</option>
                      {availableCategories.map(cat => (
                        <option key={cat} value={cat}>{cat}</option>

                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 flex items-center gap-1">
                      <Icon name="clipboard" className="w-3.5 h-3.5 text-slate-400" />

                    </label>
                    <input
                      type="text"
                      value={observacoes}
                      onChange={(e) => setObservacoes(e.target.value)}

                      placeholder="Ex: Compra do mês, boleto de luz, etc."

              ) : (
                <div className="space-y-4 animate-fadeIn">
                  <div>
                    <label className="block text-[10px] font-bold text-indigo-500 uppercase tracking-wider mb-2">
                      Recebido
                    </label>
                    <input
                      type="text"
                      value={recebedor}
                      onChange={(e) => setRecebedor(e.target.value)}
                      className="w-full text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-indigo-500"
                      placeholder="Ex: Empresa, Freelance, João, etc."
                      required
                    />
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                      <Icon name="listFilter" className="w-3.5 h-3.5 text-slate-400" />
                      Categoria da Receita
                    </label>
                    <select
                      value={categoria}
                      onChange={(e) => setCategoria(e.target.value)}
                      className="w-full text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-indigo-500"
                    >
                      <option value="" disabled>Selecione uma categoria</option>
                      {availableCategories.map(cat => (
                        <option key={cat} value={cat}>{cat}</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 flex items-center gap-1">
                      <Icon name="clipboard" className="w-3.5 h-3.5 text-slate-400" />
                      Observações (Opcional)
                    </label>
                    <input
                      type="text"
                      value={observacoes}
                      onChange={(e) => setObservacoes(e.target.value)}
                      className="w-full text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-indigo-500"
                      placeholder="Ex: Bônus por meta, rendimento líquido, etc."
                    />

                </div>
              )}

              {formError && (
                <div className="p-3 bg-rose-50 border border-rose-200 text-rose-800 rounded-xl text-xs flex items-center gap-2">
                  <Icon name="alertCircle" className="w-4 h-4 text-rose-500 shrink-0" />
                  <span>{formError}</span>
                </div>
              )}

              {success && (
                <div className="p-3 bg-emerald-50 border border-emerald-100 text-emerald-800 rounded-xl text-xs flex items-center gap-2">
                  <Icon name="check" className="w-4 h-4 text-emerald-500 shrink-0" />
                  <span>Lançamento gravado com sucesso!</span>
                </div>
              )}

              {/* Form submit dispatch trigger */}
              <button
                type="submit"
                disabled={isLoading}
                className={`w-full py-3 px-4 rounded-xl text-xs font-bold text-white transition-all flex items-center justify-center gap-1.5 shadow-sm cursor-pointer ${
                  tipo === 'DESPESA'
                    ? 'bg-rose-500 hover:bg-rose-600 disabled:bg-rose-300'
                    : 'bg-emerald-500 hover:bg-emerald-600 disabled:bg-emerald-300'
                }`}
              >
                {isLoading ? (

                ) : (
                  <>
                    <Icon name="plusCircle" className="w-4 h-4" />
                    <span>Gravar no Saldo Consolidado</span>
                  </>
                )}
              </button>

            </form>
          </div>
        );
      }

      // 8. Main APP Root Component
      function App() {
        const [user, setUser] = useState(null);
        const [authLoading, setAuthLoading] = useState(true);
        const [consolidated, setConsolidated] = useState([]);
        const [isLoading, setIsLoading] = useState(true);
        const [errorMsg, setErrorMsg] = useState(null);

        // Track local offline vs online state
        const [isLocalProtocol, setIsLocalProtocol] = useState(false);

        // Detect if loaded directly from disk via file:// scheme
        useEffect(() => {
          if (window.location.protocol === 'file:') {
            setIsLocalProtocol(true);
            console.log("Running in file:/// protocol (Direct filesystem launch mode).");
          }
        }, []);

        // Boot system auth check and connectivity check
        useEffect(() => {
          if (!isFirebaseSupported) {
            setAuthLoading(false);
            return;
          }

          const unsubscribeAuth = auth.onAuthStateChanged((firebaseUser) => {
            setUser(firebaseUser);
            setAuthLoading(false);
          });

          return () => unsubscribeAuth();
        }, []);

        // Real-time listener depending on login state
        useEffect(() => {
          if (authLoading) return;

          let unsubscribeFirestore = null;

          if (user && isFirebaseSupported) {
            setIsLoading(true);
            setErrorMsg(null);

            const q = db.collection('transactions')
              .where('userId', '==', user.uid)
              .orderBy('dataConfirmacao', 'desc');

            unsubscribeFirestore = q.onSnapshot(
              (snapshot) => {
                const txs = [];
                snapshot.forEach((docSnap) => {
                  txs.push(docSnap.data());
                });
                setConsolidated(txs);
                setIsLoading(false);
              },
              (err) => {
                setErrorMsg(`Erro de sincronização em nuvem: ${err.message}`);
                setIsLoading(false);
              }
            );
          } else {
            // Guest mode: load transactions from LocalStorage
            setIsLoading(true);
            const stored = localStorage.getItem('finfin_local_transactions');
            if (stored) {
              try {
                setConsolidated(JSON.parse(stored));
              } catch {
                setConsolidated(STATIC_DEMO_DATA);
              }
            } else {
              setConsolidated(STATIC_DEMO_DATA);
              localStorage.setItem('finfin_local_transactions', JSON.stringify(STATIC_DEMO_DATA));
            }
            setIsLoading(false);
          }

          return () => {
            if (unsubscribeFirestore) unsubscribeFirestore();
          };
        }, [user, authLoading]);

        const updateGuestsLocalStorage = (updated) => {
          setConsolidated(updated);
          localStorage.setItem('finfin_local_transactions', JSON.stringify(updated));
        };

        const handleLogin = async () => {
          if (!isFirebaseSupported) {
            setErrorMsg("Serviço de autenticação temporariamente indisponível offline.");
            return;
          }
          if (isLocalProtocol) {
            alert("A autenticação Google necessita que o aplicativo rode em um servidor web (http/https). Utilize o app no modo visitante offline ou sirva o arquivo localmente.");
            return;
          }
          try {
            setErrorMsg(null);
            await auth.signInWithPopup(googleProvider);
          } catch (err) {
            setErrorMsg(`Erro ao autenticar com o Google: ${err.message || err}`);
          }
        };

        const handleLogout = async () => {
          if (!isFirebaseSupported) return;
          try {
            await auth.signOut();
          } catch (err) {
            console.error("Erro ao desconectar:", err);
          }
        };

        const handleResetData = async () => {
          setIsLoading(true);
          try {
            if (user && isFirebaseSupported) {
              // Delete current database entries
              const q = db.collection('transactions').where('userId', '==', user.uid);
              const snapshot = await q.get();
              const batch = firebase.firestore().batch();
              
              snapshot.forEach((doc) => {
                batch.delete(doc.ref);
              });

              // Add static seed data
              STATIC_DEMO_DATA.forEach((item) => {
                const docRef = db.collection('transactions').doc(item.id);
                batch.set(docRef, { ...item, userId: user.uid });
              });

              await batch.commit();
            } else {
              // Guest mode: Reset LocalStorage
              updateGuestsLocalStorage(STATIC_DEMO_DATA);
            }
          } catch (err) {
            setErrorMsg(`Não foi possível restaurar os dados de demonstração: ${err.message}`);
          } finally {
            setIsLoading(false);
          }
        };

        const handleAddTransaction = async (payload) => {
          const newId = `trans-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
          
          if (user && isFirebaseSupported) {
            const newTx = {
              id: newId,
              userId: user.uid,
              tipo: payload.tipo,
              valor: payload.valor,
              recebedor: payload.recebedor,
              categoria: payload.categoria,
              dataConfirmacao: Date.now(),
              observacoes: payload.observacoes || ""
            };
            await db.collection('transactions').doc(newId).set(newTx);
          } else {
            const newTx = {
              id: newId,
              userId: 'guest',
              tipo: payload.tipo,
              valor: payload.valor,
              recebedor: payload.recebedor,
              categoria: payload.categoria,
              dataConfirmacao: Date.now(),
              observacoes: payload.observacoes
            };
            const updated = [newTx, ...consolidated];
            updateGuestsLocalStorage(updated);
          }
        };

        const handleDeleteTransaction = async (id) => {
          try {
            if (user && isFirebaseSupported) {
              await db.collection('transactions').doc(id).delete();
            } else {
              const filtered = consolidated.filter(t => t.id !== id);
              updateGuestsLocalStorage(filtered);
            }
          } catch (err) {
            alert(err.message || "Erro de rede ao remover registro.");
          }
        };

        // Utility to export local transactions as JSON
        const handleExportJSON = () => {
          const jsonString = `data:text/json;charset=utf-8,${encodeURIComponent(
            JSON.stringify(consolidated, null, 2)
          )}`;
          const downloadAnchor = document.createElement('a');
          downloadAnchor.setAttribute("href", jsonString);
          downloadAnchor.setAttribute("download", `financia_transacoes_${Date.now()}.json`);
          document.body.appendChild(downloadAnchor);
          downloadAnchor.click();
          downloadAnchor.remove();
        };

        return (
          <div className="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col selection:bg-indigo-600 selection:text-white">

            {/* Application Main Top Header */}
            <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-200/80 shadow-xs select-none">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                
                {/* Brand Identity */}
                <div className="flex items-center gap-2.5">
                  <div className="relative flex items-center justify-center w-10 h-10 bg-indigo-600 rounded-xl shadow-xs text-white">
                    <Icon name="coins" className="w-5.5 h-5.5" />
                    <Icon name="checkCircle" className="absolute -top-1 -right-1 w-4.5 h-4.5 bg-emerald-500 rounded-full border-2 border-white text-white p-0.5" />
                  </div>
                  <div>
                    <span className="font-display font-extrabold text-base text-slate-900 tracking-tight block">Financia</span>
                    <span className="text-[9px] text-slate-400 font-bold block uppercase tracking-wider">Gestão Financeira Consolidada</span>
                  </div>
                </div>

                {/* Right side connection modes */}
                <div className="flex items-center gap-3">
                  {authLoading ? (
                    <div className="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin" />
                  ) : user ? (
                    <div className="flex items-center gap-2.5 bg-indigo-50/50 border border-indigo-100 rounded-xl px-3 py-1.5 shadow-2xs">
                      {user.photoURL ? (
                        <img 
                          src={user.photoURL} 
                          alt={user.displayName || "Usuário"} 
                          className="w-5.5 h-5.5 rounded-full border border-indigo-200 object-cover"
                          referrerPolicy="no-referrer"
                        />
                      ) : (
                        <div className="w-5.5 h-5.5 rounded-full bg-indigo-600 text-white font-bold text-xs flex items-center justify-center">
                          {user.displayName?.charAt(0) || "U"}
                        </div>
                      )}
                      
                      <span className="hidden sm:inline-flex flex-col items-start leading-none">
                        <span className="text-[10px] font-bold text-slate-700 truncate max-w-[100px]">{user.displayName || "Minha Conta"}</span>
                        <span className="text-[8px] text-emerald-600 font-bold flex items-center gap-0.5 mt-0.5">
                          <Icon name="cloud" className="w-2.5 h-2.5" /> Nuvem Ativa
                        </span>
                      </span>

                      <button
                        type="button"
                        onClick={handleLogout}
                        className="p-1 text-slate-400 hover:text-red-500 rounded-lg transition hover:bg-slate-100 cursor-pointer"
                        title="Sair da Conta"
                      >
                        <Icon name="logOut" className="w-3.5 h-3.5" />
                      </button>
                    </div>
                  ) : (
                    <button
                      type="button"
                      onClick={handleLogin}
                      className="flex items-center gap-1.5 px-3.5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition shadow-sm cursor-pointer"
                    >
                      <Icon name="logIn" className="w-3.5 h-3.5" />
                      <span>Entrar com o Google</span>
                    </button>
                  )}

                  {/* Offline/Online active status badge */}
                  <span className={`text-[10px] font-bold border px-3 py-1.5 rounded-xl hidden sm:flex items-center gap-1.5 font-mono ${
                    user 
                      ? 'bg-emerald-50 border-emerald-100 text-emerald-700' 
                      : 'bg-amber-50 border-amber-100 text-amber-700'
                  }`}>
                    <span className={`w-1.5 h-1.5 rounded-full ${user ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`} />
                    {user ? "NUVEM" : "MODO VISITANTE"}
                  </span>
                </div>

              </div>
            </header>

            {/* Application Main Layout Wrapper */}
            <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
              
              {/* Authentication warning alert notifications */}
              {errorMsg && (
                <div className="mb-6 p-4 bg-rose-50 border border-rose-200 text-rose-800 rounded-3xl text-xs flex items-center justify-between gap-3 shadow-2xs">
                  <div className="flex items-center gap-2.5">
                    <Icon name="alertCircle" className="w-5 h-5 text-rose-500 shrink-0" />
                    <div>
                      <span className="font-bold block">Status do Sistema</span>
                      <p className="text-[11px] text-rose-600 mt-0.5">{errorMsg}</p>
                    </div>
                  </div>
                  <button 
                    type="button" 
                    onClick={() => setErrorMsg(null)} 
                    className="px-3 py-1.5 bg-white hover:bg-slate-100 text-rose-700 text-xs font-bold rounded-lg border border-rose-200 transition cursor-pointer shrink-0"
                  >
                    Fechar
                  </button>
                </div>
              )}

              <div className="space-y-6">
                
                {/* Visual Dashboard Banner */}
                <div className="bg-slate-900 rounded-3xl p-6 text-white relative overflow-hidden flex flex-col md:flex-row md:items-center justify-between gap-6 shadow-md border border-slate-800">
                  <div className="absolute top-0 right-0 w-80 h-80 bg-white/5 rounded-full blur-3xl pointer-events-none select-none" />
                  
                  <div className="space-y-1.5 relative z-10 max-w-xl">
                    <span className="inline-flex items-center gap-1 bg-indigo-500/15 text-indigo-300 border border-indigo-400/20 px-2.5 py-0.5 rounded-md text-[9px] font-bold uppercase tracking-wider">
                      Controle Consolidado
                    </span>
                    <h2 className="font-display font-extrabold text-2xl tracking-tight flex items-center gap-2 leading-none">
                      Painel Financeiro Financia
                      {user && <Icon name="sparkles" className="w-5 h-5 text-indigo-300 animate-pulse" />}
                    </h2>
                    <p className="text-xs text-slate-300 leading-relaxed max-w-lg">
                      Seja bem-vindo! {user ? `Olá, ${user.displayName}! Seus dados estão salvos de forma segura em tempo real na nuvem.` : "Gerencie receitas e despesas com segurança. Faça login para persistir as transações em seu perfil ou utilize o modo local offline livremente."}
                    </p>
                  </div>

                  {/* Actions Bar */}
                  <div className="flex flex-wrap gap-2.5 shrink-0 z-10">
                    <button
                      type="button"
                      onClick={handleExportJSON}
                      className="px-4 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold tracking-wide flex items-center gap-1.5 transition text-slate-200 border border-slate-700 cursor-pointer"
                      title="Salvar backup das suas transações"
                    >
                      <Icon name="download" className="w-3.5 h-3.5" />
                      Exportar Dados
                    </button>
                    <button
                      type="button"
                      onClick={handleResetData}
                      disabled={isLoading}
                      className="px-4 py-2.5 bg-white hover:bg-slate-100 rounded-xl text-xs font-bold tracking-wide flex items-center gap-1.5 transition text-slate-900 shadow-sm cursor-pointer disabled:opacity-50"
                    >
                      <Icon name="refreshCw" className={`w-3.5 h-3.5 ${isLoading ? 'animate-spin' : ''}`} />
                      Restaurar Demo
                    </button>
                  </div>
                </div>

                {/* Cloud storage warning callback */}
                {!user && (
                  <div className="p-4 bg-indigo-50 border border-indigo-100 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-sm select-none">
                    <div className="flex gap-3 min-w-0">
                      <div className="p-3 bg-indigo-100 text-indigo-600 rounded-xl shrink-0 h-fit">
                        <Icon name="folderLock" className="w-5 h-5" />
                      </div>
                      <div className="min-w-0">
                        <h4 className="font-display font-bold text-slate-800 text-xs sm:text-sm">Seus dados estão rodando de forma local!</h4>
                        <p className="text-[11px] sm:text-xs text-slate-500 mt-1 leading-normal">
                          Para sincronizar permanentemente na nuvem e consultar em tempo real a partir de outros dispositivos, conecte sua conta Google gratuitamente.
                        </p>
                      </div>
                    </div>
                    <button
                      type="button"
                      onClick={handleLogin}
                      className="w-full sm:w-auto px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition shadow-sm text-center cursor-pointer shrink-0"
                    >
                      Ativar Nuvem
                    </button>
                  </div>
                )}

                {/* Two Column layout for form inputs and logs view */}
                <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
                  
                  {/* Left Column: Visual overview statistics & history */}
                  <div className="xl:col-span-7 space-y-6">
                    <FinanceDashboard 
                      consolidated={consolidated} 
                      onReset={handleResetData} 
                      isLoading={isLoading}
                    />

                    <ConsolidatedHistory 
                      transactions={consolidated} 
                      onDelete={handleDeleteTransaction}
                      isLoading={isLoading}
                    />
                  </div>

                  {/* Right Column: Direct transaction launch input fields */}
                  <div className="xl:col-span-5">
                    <TransactionForm 
                      onAddTransaction={handleAddTransaction}
                      isLoading={isLoading}
                    />
                  </div>

                </div>

              </div>

            </main>

            {/* Footer */}
            <footer className="bg-white border-t border-slate-200/60 py-6 mt-auto select-none">
              <div className="max-w-7xl mx-auto px-4 text-center space-y-1">
                <p className="text-xs text-slate-500 font-bold font-display">
                  Financia - Sistema Simplificado de Controle e Conciliação Financeira
                </p>
                <p className="text-[10px] text-slate-400 font-mono">
                  Projetado com suporte a balanceamento de fluxo de caixa, segurança zero-trust e persistência em nuvem.
                </p>
              </div>
            </footer>

          </div>
        );
      }

      // Render ReactDOM App Node
      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    </script>
  </body>
</html>
